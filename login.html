<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="common.css">
    <style>
        .login-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .login-section {
            margin: 60px auto;
            background-color: white;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(56, 189, 248, 0.13), 0 1.5px 8px rgba(0,0,0,0.08);
            border: 4px solid;
            border-image: linear-gradient(90deg, #38bdf8 0%, #6366f1 100%);
            border-image-slice: 1;
            animation: fadeInLogin 1.2s cubic-bezier(0.4,0,0.2,1);
        }

        .login-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 18px;
            text-align: center;
        }
        .input-group {
            display: flex;
            align-items: center;
            width: 100%;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 8px;
            background: #f8fafc;
        }
        .input-group svg {
            margin-right: 8px;
            color: #94a3b8;
        }
        .login-form input {
            border: none;
            outline: none;
            background: transparent;
            flex: 1;
            font-size: 1rem;
        }
        .forgot-link {
            align-self: flex-end;
            margin-bottom: 10px;
            font-size: 0.95rem;
            color: #6366f1;
            text-decoration: none;
            transition: color 0.2s;
        }
        .forgot-link:hover {
            color: #38bdf8;
        }
        .gradient-btn {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-radius: 24px;
            background: linear-gradient(90deg, #38bdf8 0%, #a78bfa 100%);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            transition: transform 0.2s;
        }
        .gradient-btn:hover {
            transition: transform 0.2s;
            background: linear-gradient(90deg, #6366f1 0%, #38bdf8 100%);
            transform: scale(1.05);
        }
        .social-login {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin: 18px 0 10px 0;
        }
        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background 0.2s;
        }
        .social-btn.facebook { color: #1877f3; }
        .social-btn.twitter { color: #1da1f2; }
        .social-btn.google { color: #ea4335; }
        .signup-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
        }
        .signup-link:hover { color: #38bdf8; }

        
        
    </style>
</head>
